version: "3.8"
services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio1234
    volumes:
      - minio-data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    restart: always
    networks:
      - pdf-comp
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo-data:/data/db
    restart: always
    networks:
      - pdf-comp
  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express
    depends_on: [mongo]
    ports:
      - "8081:8081"
    restart: always
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass
    networks:
      - pdf-comp
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    networks:
      - pdf-comp
  frontend:
    build:
      context: ./apps/client
    container_name: frontend
    ports:
      - "3000:80"
    restart: always
    networks:
      - pdf-comp
  file-manager:
    build:
      context: ./apps/services/file-manager
    container_name: file-manager
    ports:
      - "4000:4000"
    restart: always
    depends_on: [mongo, minio, rabbitmq]
    networks:
      - pdf-comp
  compressor:
    build:
      context: ./apps/services/compressor
    container_name: compressor
    restart: always
    depends_on: [mongo, minio, rabbitmq]
    networks:
      - pdf-comp
  janitor:
    build:
      context: ./apps/services/janitor
    container_name: janitor
    restart: always
    depends_on: [mongo, minio, rabbitmq]
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 100M
    networks:
      - pdf-comp
  gateway:
    image: nginx:stable-alpine
    container_name: gateway
    ports:
      - "80:80"
    restart: always
    depends_on: [frontend, file-manager]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - pdf-comp
    command: ["nginx", "-g", "daemon off;"]
volumes:
  minio-data:
    driver: local
  mongo-data:
    driver: local
networks:
  pdf-comp:
    driver: bridge
